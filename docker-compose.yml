version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - sqlite_data:/app/data
    environment:
      - DATABASE_URL=file:/app/data/veo-geo-league.db
      - NODE_ENV=production
    restart: unless-stopped

volumes:
  sqlite_data:
    driver: local
